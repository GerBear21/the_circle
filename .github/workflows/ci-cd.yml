name: CI Pipeline

# ─────────────────────────────────────────────────────────────
# CI checks for pushes to develop / main and PRs targeting them.
#
# Deployment is handled by Vercel's native Git integration (it
# auto-deploys develop → staging and main → production on push),
# so this workflow only runs quality gates — it does NOT deploy.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1 — Type Check
  # Runs on every push and PR. Catches TypeScript errors early.
  # ═══════════════════════════════════════════════════════════
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        env:
          # Dummy values so tsc doesn't fail on missing env vars
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  # ═══════════════════════════════════════════════════════════
  # JOB 2 — Lint
  # Runs on every push and PR. Enforces code style rules.
  # ═══════════════════════════════════════════════════════════
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run ESLint
        run: npm run lint -- --max-warnings=100
        # --max-warnings=100: allows warnings but fails on errors
        # The .eslintrc.json at the project root prevents the interactive setup prompt

  # ═══════════════════════════════════════════════════════════
  # JOB 3 — Security Audit
  # Checks for known vulnerabilities in npm packages.
  # ═══════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check for critical vulnerabilities (production deps only)
        run: npm audit --audit-level=critical --omit=dev
        # --omit=dev: only audits production dependencies (not type definitions, test tools, etc.)
        # --audit-level=critical: fails only on critical CVEs
        #
        # Known accepted HIGH risks (reviewed and documented):
        # 1. GHSA-9g9p-9gw9-jx7f (next.js DoS via Image Optimizer remotePatterns)
        #    → Only affects SELF-HOSTED deployments. We run on Vercel → NOT EXPOSED.
        #    → Fix requires Next.js 15 upgrade (planned as separate task).
        # 2. GHSA-wgrm-67xf-hhpq (pdfjs-dist arbitrary JS execution)
        #    → Only in @types/react-pdf (dev dependency, never runs in production).
        #    → Our production pdfjs-dist@^5.6 is not affected (vuln is <=4.1.392).
        #
        # These risks are documented in docs/RISK_REGISTER.md per ISO 27001 Annex A.8.8

  # ═══════════════════════════════════════════════════════════
  # JOB 4 — Build
  # Makes sure the project actually compiles successfully.
  # Only runs after typecheck, lint, and security all pass.
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Next.js app
        run: npm run build
        env:
          # These are dummy values just for the build check.
          # Real values live in Vercel — not here.
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: build-time-placeholder-not-a-real-secret
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          AZURE_CLIENT_ID: placeholder
          AZURE_CLIENT_SECRET: placeholder
          AZURE_TENANT: common
          HRIMS_SUPABASE_URL: https://placeholder.supabase.co
          HRIMS_SUPABASE_SERVICE_ROLE_KEY: placeholder

  # ═══════════════════════════════════════════════════════════
  # JOB 5 — Deploy to PRODUCTION (gated)
  # Runs only on push to main, AFTER build passes, and pauses for
  # manual approval via the GitHub "production" environment
  # (configure Required reviewers on that environment).
  #
  # Vercel's native auto-deploy for main is disabled in vercel.json
  # (git.deploymentEnabled.main = false), so this is the ONLY path
  # to production — no double deploys. Staging still auto-deploys
  # from develop via Vercel's Git integration (not gated here).
  # ═══════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://thecircle.rtgapps.com
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
