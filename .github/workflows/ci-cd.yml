name: CI/CD Pipeline

# ─────────────────────────────────────────────────────────────
# Runs on every push to develop (→ staging) and main (→ prod)
# Also runs on every Pull Request targeting those branches
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1 — Type Check
  # Runs on every push and PR. Catches TypeScript errors early.
  # ═══════════════════════════════════════════════════════════
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        env:
          # Dummy values so tsc doesn't fail on missing env vars
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  # ═══════════════════════════════════════════════════════════
  # JOB 2 — Lint
  # Runs on every push and PR. Enforces code style rules.
  # ═══════════════════════════════════════════════════════════
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run ESLint
        run: npm run lint -- --max-warnings=100
        # --max-warnings=100: allows warnings but fails on errors
        # The .eslintrc.json at the project root prevents the interactive setup prompt

  # ═══════════════════════════════════════════════════════════
  # JOB 3 — Security Audit
  # Checks for known vulnerabilities in npm packages.
  # ═══════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check for critical vulnerabilities (production deps only)
        run: npm audit --audit-level=critical --omit=dev
        # --omit=dev: only audits production dependencies (not type definitions, test tools, etc.)
        # --audit-level=critical: fails only on critical CVEs
        #
        # Known accepted HIGH risks (reviewed and documented):
        # 1. GHSA-9g9p-9gw9-jx7f (next.js DoS via Image Optimizer remotePatterns)
        #    → Only affects SELF-HOSTED deployments. We run on Vercel → NOT EXPOSED.
        #    → Fix requires Next.js 15 upgrade (planned as separate task).
        # 2. GHSA-wgrm-67xf-hhpq (pdfjs-dist arbitrary JS execution)
        #    → Only in @types/react-pdf (dev dependency, never runs in production).
        #    → Our production pdfjs-dist@^5.6 is not affected (vuln is <=4.1.392).
        #
        # These risks are documented in docs/RISK_REGISTER.md per ISO 27001 Annex A.8.8

  # ═══════════════════════════════════════════════════════════
  # JOB 4 — Build
  # Makes sure the project actually compiles successfully.
  # Only runs after typecheck, lint, and security all pass.
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Next.js app
        run: npm run build
        env:
          # These are dummy values just for the build check.
          # Real values live in Vercel — not here.
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: build-time-placeholder-not-a-real-secret
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          AZURE_CLIENT_ID: placeholder
          AZURE_CLIENT_SECRET: placeholder
          AZURE_TENANT: common
          HRIMS_SUPABASE_URL: https://placeholder.supabase.co
          HRIMS_SUPABASE_SERVICE_ROLE_KEY: placeholder

  # ═══════════════════════════════════════════════════════════
  # JOB 5 — Deploy to STAGING
  # Only runs when code is pushed to the develop branch.
  # Triggers after build passes.
  # ═══════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build]
    # Only deploy on direct pushes to develop — not on PRs
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Staging)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # No --prod flag = Vercel Preview deployment = uses staging env vars
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: true

      - name: Print staging URL
        run: echo "Deployed to staging ${{ steps.deploy.outputs.preview-url }}"

  # ═══════════════════════════════════════════════════════════
  # JOB 6 — Deploy to PRODUCTION
  # Only runs when code is merged into main.
  # Requires manual approval (configured in GitHub environments).
  # ═══════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build]
    # Only deploy on direct pushes to main — not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://the-circle-approvals.vercel.app  # update to circle.rtgatlas.com when domain is ready
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'  # <-- this flag makes it a production deployment
          github-token: ${{ secrets.GITHUB_TOKEN }}
# Pipeline test
